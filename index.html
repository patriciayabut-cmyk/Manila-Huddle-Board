<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manila Services — Huddle Board</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f5f7;color:#1a1a2e;font-size:13px;min-height:100vh}
.app{max-width:980px;margin:0 auto;padding:1.25rem 1rem}
.header{background:#fff;border-radius:10px;padding:1rem 1.25rem;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.header h1{font-size:16px;font-weight:600}
.header-meta{font-size:11px;color:#666;margin-top:2px}
.dl-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600}
.dl-ok{background:#e8f5e9;color:#2e7d32}.dl-warn{background:#fff8e1;color:#f57f17}.dl-due{background:#ffebee;color:#c62828}
.nav-btns{display:flex;gap:5px;flex-wrap:wrap}
.nbtn{padding:5px 14px;border:1.5px solid #ddd;border-radius:7px;background:#fff;cursor:pointer;font-size:12px;color:#555;font-weight:500}
.nbtn.active{background:#1a1a2e;border-color:#1a1a2e;color:#fff}
.nbtn:hover:not(.active){background:#f4f5f7}
.status-bar{background:#fff;border-radius:8px;padding:.5rem 1rem;margin-bottom:.75rem;font-size:11px;color:#666;display:flex;align-items:center;gap:8px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sdot.ok{background:#4caf50}.sdot.loading{background:#ff9800;animation:pulse 1s infinite}.sdot.err{background:#f44336}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pane{display:none}.pane.active{display:block}
.vtabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:.75rem}
.vtab{padding:5px 12px;border:1.5px solid #ddd;border-radius:7px;background:#fff;cursor:pointer;font-size:11px;color:#555;white-space:nowrap;font-weight:500}
.vtab.active{background:#1a1a2e;border-color:#1a1a2e;color:#fff}
.vtab:hover:not(.active){background:#f4f5f7}
.vsec{display:none}.vsec.active{display:block}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:.85rem}
.mc{background:#fff;border-radius:8px;padding:.85rem 1rem;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.mc-label{font-size:10px;color:#888;margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}
.mc-val{font-size:20px;font-weight:700}
.mc-sub{font-size:10px;color:#aaa;margin-top:2px}
.func-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:8px;margin-bottom:.85rem}
.fc{background:#fff;border-radius:8px;padding:.85rem;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1.5px solid transparent;transition:border-color .15s}
.fc:hover{border-color:#1a1a2e}
.fc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.fc-name{font-size:12px;font-weight:600}.fc-role{font-size:10px;color:#888;margin-top:1px}
.fc-dots{display:flex;gap:4px;align-items:center}
.rag{width:9px;height:9px;border-radius:50%}
.rag-G{background:#4caf50}.rag-A{background:#ff9800}.rag-R{background:#f44336}.rag-N{background:#ccc}
.upd{width:9px;height:9px;border-radius:3px}.upd-y{background:#4caf50}.upd-n{background:#ddd}
.km-row{display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px}
.km-lbl{color:#888;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:4px}
.km-val{font-weight:600;flex-shrink:0}
.km-bar{height:3px;background:#f0f0f0;border-radius:2px;margin-bottom:4px}
.km-fill{height:100%;border-radius:2px}
.fc-stamp{font-size:10px;color:#aaa;margin-top:6px;font-style:italic}
.no-data{font-size:11px;color:#aaa;font-style:italic;padding:2px 0 6px}
.card{background:#fff;border-radius:8px;padding:.85rem 1rem;margin-bottom:.75rem;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#888;margin-bottom:.5rem}
.det-hdr{margin-bottom:1rem}
.det-title{font-size:15px;font-weight:700}
.det-sub{font-size:11px;color:#888;margin-top:4px;line-height:1.7}
.kpi-tbl{width:100%;border-collapse:collapse;font-size:12px}
.kpi-tbl th{text-align:left;padding:6px 10px;border-bottom:1px solid #f0f0f0;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:#aaa}
.kpi-tbl td{padding:6px 10px;border-bottom:1px solid #f8f8f8;vertical-align:middle}
.kpi-tbl tr:last-child td{border-bottom:none}
.rb{display:inline-flex;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
.rb.G{background:#e8f5e9;color:#2e7d32}.rb.A{background:#fff3e0;color:#e65100}.rb.R{background:#ffebee;color:#c62828}.rb.N{background:#f5f5f5;color:#999}
.tup{color:#4caf50;font-weight:600}.tdn{color:#f44336;font-weight:600}
.nar-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.nc{background:#fafafa;border-radius:7px;padding:.75rem}
.nc-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:#aaa;margin-bottom:4px}
.nc-text{font-size:12px;line-height:1.6;color:#333}
.he{border:1px solid #f0f0f0;border-radius:7px;padding:.6rem .85rem;margin-bottom:5px;cursor:pointer}
.he:hover{border-color:#ddd}
.he-hdr{display:flex;justify-content:space-between;font-weight:600;font-size:11px;margin-bottom:4px}
.pill{font-size:10px;padding:1px 8px;border-radius:20px;background:#e8f0fe;color:#1565c0;margin-right:3px}
.wk-sel{display:flex;align-items:center;gap:8px;margin-bottom:.75rem;flex-wrap:wrap}
.wk-sel label{font-size:12px;color:#666;font-weight:500;white-space:nowrap}
.wk-sel select,.mo-sel select{padding:5px 10px;border:1.5px solid #ddd;border-radius:7px;background:#fff;font-size:12px;color:#333;min-width:200px}
.mo-sel{display:flex;align-items:center;gap:8px;margin-bottom:.75rem;flex-wrap:wrap}
.mo-sel label{font-size:12px;color:#666;font-weight:500;white-space:nowrap}
.imt-tabs{display:flex;gap:5px;margin-bottom:.85rem;flex-wrap:wrap}
.imt{padding:5px 14px;border:1.5px solid #ddd;border-radius:7px;background:#fff;cursor:pointer;font-size:12px;color:#555;font-weight:500}
.imt.active{background:#1a1a2e;border-color:#1a1a2e;color:#fff}
.func-sel{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:.85rem}
.fsb{padding:4px 11px;border:1.5px solid #ddd;border-radius:7px;background:#fff;cursor:pointer;font-size:11px;color:#555;font-weight:500}
.fsb.active{background:#1a1a2e;border-color:#1a1a2e;color:#fff}
.form-card{background:#fff;border-radius:8px;padding:1rem 1.25rem;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.fsec{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:#888;margin:1rem 0 .5rem;padding-bottom:3px;border-bottom:1px solid #f0f0f0}
.ng{display:flex;flex-direction:column;gap:3px}
.ng.full{grid-column:1/-1}
.ng label{font-size:11px;color:#888;font-weight:500}
.ng input,.ng textarea,.ng select{padding:7px 9px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#1a1a2e;font-size:12px;font-family:inherit}
.ng textarea{resize:vertical;min-height:62px}
.ng .hint{font-size:10px;color:#aaa;margin-top:2px}
.nar-inp-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.kpi-inp{display:grid;grid-template-columns:1fr 90px 90px;gap:7px;align-items:center;margin-bottom:7px;font-size:12px}
.kpi-inp span{color:#888}
.kpi-inp input{padding:5px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px;font-family:inherit;width:100%}
.info-box{background:#f4f5f7;border-radius:7px;padding:.6rem .85rem;font-size:12px;color:#555;margin-bottom:.75rem}
.btn-row{display:flex;align-items:center;gap:10px;margin-top:.85rem;flex-wrap:wrap}
.save-btn{padding:8px 20px;background:#1a1a2e;color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600}
.save-btn:hover{background:#2d2d4e}
.save-btn:disabled{background:#ccc;cursor:not-allowed}
.clear-btn{padding:7px 14px;border:1.5px solid #ddd;border-radius:7px;background:#fff;cursor:pointer;font-size:12px;color:#888}
.dl-info{font-size:11px;padding:8px 12px;border-radius:7px;margin-bottom:.85rem;font-weight:500}
.dl-weekly{background:#e8f5e9;color:#2e7d32}
.dl-kpi{background:#e8f0fe;color:#1565c0}
.dl-hc{background:#f3e5f5;color:#6a1b9a}
.rpt-ctrl{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:.85rem}
.rpt-sel{padding:6px 10px;border:1.5px solid #ddd;border-radius:7px;background:#fff;font-size:12px;color:#333}
.rpt-btn{padding:7px 16px;background:#1a1a2e;color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600}
.prt-btn{padding:7px 16px;background:#fff;border:1.5px solid #ddd;border-radius:7px;cursor:pointer;font-size:12px;color:#555}
#report-out{background:#fff;border-radius:8px;padding:1.5rem;box-shadow:0 1px 3px rgba(0,0,0,.06);font-size:12px;line-height:1.7}
.rpt-title{font-size:20px;font-weight:700;margin-bottom:4px}
.rpt-sub{font-size:11px;color:#888;margin-bottom:1.25rem;padding-bottom:.75rem;border-bottom:1px solid #eee}
.rpt-exec{background:#f4f5f7;border-radius:8px;padding:1rem 1.25rem;margin-bottom:1.25rem}
.rpt-exec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem;color:#888}
.rpt-fsec{margin-bottom:1.25rem;padding-bottom:1.25rem;border-bottom:1px solid #eee}
.rpt-fsec:last-child{border-bottom:none}
.rpt-fhdr{display:flex;align-items:center;gap:8px;margin-bottom:.75rem}
.rpt-fname{font-size:13px;font-weight:700}
.rpt-kpi-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:6px;font-size:11px;padding:4px 0;border-bottom:1px solid #f0f0f0}
.rpt-kpi-row:last-child{border-bottom:none}
.rpt-kpi-row.hdr{font-weight:700;color:#aaa;font-size:10px;text-transform:uppercase}
.rpt-nar-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:.75rem}
.rpt-nar-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#aaa;margin-bottom:3px}
.toast{position:fixed;bottom:20px;right:20px;background:#1a1a2e;color:#fff;padding:10px 18px;border-radius:8px;font-size:12px;font-weight:600;z-index:9999;display:none;box-shadow:0 4px 12px rgba(0,0,0,.15)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <h1>Manila Services — Huddle Board</h1>
      <div class="header-meta" id="week-meta"></div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
      <span class="dl-badge" id="dl-badge"></span>
      <div class="nav-btns">
        <button class="nbtn active" id="nb-dash"   onclick="setNav('dash')">📊 Dashboard</button>
        <button class="nbtn"        id="nb-update" onclick="setNav('update')">✏️ Enter Update</button>
        <button class="nbtn"        id="nb-report" onclick="setNav('report')">📄 Monthly Report</button>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <div class="sdot loading" id="sdot"></div>
    <span id="stext">Connecting to Google Sheets...</span>
  </div>

  <!-- DASHBOARD -->
  <div class="pane active" id="pane-dash">
    <div class="vtabs" id="vtabs"></div>
    <div class="vsec active" id="vsec-overview">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:.75rem;flex-wrap:wrap">
        <label style="font-size:12px;color:#666;font-weight:500">Viewing week:</label>
        <select id="week-filter" onchange="onWeekFilterChange()" style="padding:5px 10px;border:1.5px solid #ddd;border-radius:7px;background:#fff;font-size:12px;color:#333;min-width:220px"></select>
        <span style="font-size:11px;color:#aaa" id="wf-meta"></span>
      </div>
      <div class="metrics">
        <div class="mc"><div class="mc-label">Total headcount</div><div class="mc-val" id="ov-hc">—</div><div class="mc-sub">across all functions</div></div>
        <div class="mc"><div class="mc-label">Annualized attrition</div><div class="mc-val" id="ov-att">—</div><div class="mc-sub">Manila Services avg</div></div>
        <div class="mc"><div class="mc-label">Internal movement %</div><div class="mc-val" id="ov-promo">—</div><div class="mc-sub">movements YTD vs HC</div></div>
        <div class="mc"><div class="mc-label">Updated this week</div><div class="mc-val" id="ov-upd">—</div><div class="mc-sub">of 11 functions</div></div>
      </div>
      <div class="func-grid" id="func-cards"></div>
    </div>
    <div id="func-vsecs"></div>
  </div>

  <!-- UPDATE -->
  <div class="pane" id="pane-update">
    <div class="imt-tabs">
      <button class="imt active" id="imt-w" onclick="setInpMode('weekly')">📝 Weekly narrative <small style="opacity:.6">(due Mon EOD)</small></button>
      <button class="imt"        id="imt-k" onclick="setInpMode('kpi')">📈 Monthly KPIs <small style="opacity:.6">(once a month)</small></button>
      <button class="imt"        id="imt-h" onclick="setInpMode('hc')">👥 HC &amp; People data <small style="opacity:.6">(once a month)</small></button>
    </div>
    <div class="func-sel" id="inp-fsel"></div>
    <div id="inp-form"></div>
  </div>

  <!-- REPORT -->
  <div class="pane" id="pane-report">
    <div class="rpt-ctrl">
      <select class="rpt-sel" id="rpt-month"></select>
      <button class="rpt-btn" onclick="generateReport()">Generate ↗</button>
      <button class="prt-btn" onclick="printReport()">🖨 Print / Save PDF</button>
    </div>
    <div id="report-out"><div style="color:#aaa;font-size:12px">Select a month and click Generate.</div></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ─── CONFIG ──────────────────────────────────────────────────
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxzE0ecv1NSi08-RpcCKZQ1VASqlQnf72_GNTZv3CrhJveL517NpPf-qYZN-NkqfANStg/exec';

const FUNCS = [
  {id:'grace',    name:'Grace Ulep',       role:'CRC Operations',           hc:49},
  {id:'joyce',    name:'Joyce Wise',       role:'Planning & Scheduling',    hc:37},
  {id:'helen',    name:'Helen Dy',         role:'Data & Procurement',       hc:34},
  {id:'wilma',    name:'Wilma Paneza',     role:'Billing & Order Admin',    hc:40},
  {id:'michael',  name:'Michael Garong',   role:'Parts & Logistics',        hc:54},
  {id:'kath',     name:'Kath Rogacion',    role:'CI PMO',                   hc:2},
  {id:'eric',     name:'Eric Poja',        role:'ERS / Eng Reports',        hc:36},
  {id:'roshie',   name:'Roshie Aquino',    role:'Sales Operations',         hc:44},
  {id:'marianne', name:'Marianne Dimla',   role:'TKO / ConnectedCE / RCA',  hc:27},
  {id:'tristan',  name:'Tristan Laniohan', role:'Tech Support',             hc:29},
  {id:'norbert',  name:'Norbert Emata',    role:'Engineering Services',     hc:4},
];

const KPI_DEFS = {
  grace:   [{l:'Service Level Achievement',t:90,hi:true},{l:'Answer Rate',t:90,hi:true},{l:'Quality Score',t:90,hi:true},{l:'CSAT Score',t:70,hi:true}],
  joyce:   [{l:'TAT Audit %',t:100,hi:true},{l:'TAT Triage %',t:100,hi:true},{l:'Aging Backlog %',t:5,hi:false},{l:'PM Completion %',t:90,hi:true}],
  helen:   [{l:'FSR Invoice ≤4d',t:90,hi:true},{l:'Vendor Invoice ≤10d',t:90,hi:true},{l:'T&M Quote ≤24hrs',t:96,hi:true},{l:'FSR to Billing ≤5d',t:90,hi:true}],
  wilma:   [{l:'Revenue vs Target %',t:100,hi:true},{l:'Invoicing Accuracy %',t:98,hi:true},{l:'Aging SR Resolution %',t:95,hi:true}],
  michael: [{l:'Monthly Revenue %',t:100,hi:true},{l:'TAT Compliance %',t:95,hi:true},{l:'Process Accuracy %',t:99,hi:true},{l:'Order Accuracy %',t:98,hi:true},{l:'Response SLA %',t:90,hi:true}],
  kath:    [{l:'CI Projects',t:5,hi:true},{l:'A3s Active',t:10,hi:true},{l:'VOS Training %',t:100,hi:true},{l:'AI Guild Members',t:40,hi:true}],
  eric:    [{l:'Bid Review TAT (days)',t:1.5,hi:false},{l:'PSE Projects Active',t:100,hi:true},{l:'Attrition %',t:10,hi:false}],
  roshie:  [{l:'Contracts vs Budget %',t:100,hi:true},{l:'QA Score %',t:90,hi:true},{l:'Posts Filled %',t:100,hi:true}],
  marianne:[{l:'TKO Content TAT %',t:85,hi:true},{l:'RCA TAT %',t:80,hi:true},{l:'Warranty Claims TAT %',t:90,hi:true}],
  tristan: [{l:'T1 First Contact Res %',t:80,hi:true},{l:'Next Predict Uptime %',t:99,hi:true},{l:'Open Requisitions',t:5,hi:false}],
  norbert: [{l:'TKO Content TAT %',t:85,hi:true},{l:'RCA TAT %',t:80,hi:true},{l:'Warranty Claims TAT %',t:90,hi:true}],
};

const NAR_FIELDS = [
  {k:'customerFocus',label:'Customer focus'},
  {k:'innovation',   label:'Innovation'},
  {k:'opEx',         label:'Operational excellence'},
  {k:'hpCulture',    label:'High performance culture'},
  {k:'strategic',    label:'Strategic priorities'},
  {k:'redFlag',      label:'Red flag / blocker'},
  {k:'discussion',   label:'Discussion / actions needed'},
];

// ─── STATE ───────────────────────────────────────────────────
let allWeekly = [], allKpis = [], dataLoaded = false;
let nav = 'dash', inpMode = 'weekly', inpFunc = 'grace';
let viewSec = 'overview';
let detailWeek = {}, detailKpiMonth = {};
let selectedFilterWeek = 'latest';

// ─── HELPERS ─────────────────────────────────────────────────
function localMonth() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}

function normalizeMonth(m) {
  if (!m) return '';
  return String(m).slice(0,7);
}

function getRag(fid, idx, val) {
  const d = KPI_DEFS[fid]; if (!d||!d[idx]) return 'N';
  const k = d[idx];
  if (k.hi) { if (val>=k.t) return 'G'; if (val>=k.t*.95) return 'A'; return 'R'; }
  else { if (val<=k.t) return 'G'; if (val<=k.t*1.1) return 'A'; return 'R'; }
}

function getFuncRag(fid) {
  const kpis = getLatestKpis(fid); if (!kpis.length) return 'N';
  const rags = kpis.map((v,i)=>getRag(fid,i,v));
  if (rags.includes('R')) return 'R'; if (rags.includes('A')) return 'A'; return 'G';
}

function getLatestKpis(fid) {
  const arr = allKpis.filter(r=>r.funcId===fid&&(r.kpi1||r.kpi2||r.kpi3));
  if (!arr.length) return [];
  arr.sort((a,b)=>normalizeMonth(b.month).localeCompare(normalizeMonth(a.month)));
  const r = arr[0];
  return [r.kpi1,r.kpi2,r.kpi3,r.kpi4,r.kpi5].filter(v=>v!==''&&v!=null&&v!==undefined).map(Number);
}

function getKpisForMonth(fid, month) {
  const nm = normalizeMonth(month);
  const arr = allKpis.filter(r=>r.funcId===fid&&normalizeMonth(r.month)===nm&&(r.kpi1||r.kpi2||r.kpi3));
  if (!arr.length) return null;
  arr.sort((a,b)=>String(b.updatedAt).localeCompare(String(a.updatedAt)));
  const r = arr[0];
  return [r.kpi1,r.kpi2,r.kpi3,r.kpi4,r.kpi5].filter(v=>v!==''&&v!=null&&v!==undefined).map(Number);
}

function getLatestPeopleRec(fid) {
  // Get most recently updated KPI record that has people data
  const arr = allKpis.filter(r=>r.funcId===fid);
  if (!arr.length) return null;
  // Sort by updatedAt descending
  arr.sort((a,b)=>String(b.updatedAt).localeCompare(String(a.updatedAt)));
  // Find first one with any people data
  const withPeople = arr.find(r=>r.resignations||r.promotions||r.avgHC||r.openRequisitions);
  return withPeople || arr[0];
}

function getLatestHC(fid) {
  const arr = allWeekly.filter(r=>r.funcId===fid&&r.hc&&parseInt(r.hc)>0);
  if (!arr.length) {
    const pr = getLatestPeopleRec(fid);
    if (pr && pr.avgHC) return parseInt(pr.avgHC);
    const f = FUNCS.find(x=>x.id===fid); return f?f.hc:0;
  }
  arr.sort((a,b)=>String(b.updatedAt).localeCompare(String(a.updatedAt)));
  return parseInt(arr[0].hc)||0;
}

function getAttrition(fid) {
  const pr = getLatestPeopleRec(fid);
  if (!pr || !pr.resignations) return null;
  const resignations = parseFloat(pr.resignations)||0;
  const avgHC = parseFloat(pr.avgHC)||getLatestHC(fid)||1;
  const monthNum = parseInt(normalizeMonth(pr.month).split('-')[1])||1;
  const rate = (resignations/avgHC)*(12/monthNum)*100;
  return {rate:rate.toFixed(1), resignations, avgHC, monthNum};
}

function getPromo(fid) {
  const pr = getLatestPeopleRec(fid);
  if (!pr || !pr.promotions) return null;
  const promotions = parseFloat(pr.promotions)||0;
  const avgHC = parseFloat(pr.avgHC)||getLatestHC(fid)||1;
  const pct = ((promotions/avgHC)*100).toFixed(1);
  return {pct, promotions, avgHC};
}

function getLatestNarrative(fid) {
  const arr = allWeekly.filter(r=>r.funcId===fid);
  if (!arr.length) return null;
  return [...arr].sort((a,b)=>String(b.updatedAt).localeCompare(String(a.updatedAt)))[0];
}

function getFilteredNarrative(fid) {
  const arr = allWeekly.filter(r=>r.funcId===fid);
  if (!arr.length) return null;
  if (selectedFilterWeek==='latest') return [...arr].sort((a,b)=>String(b.updatedAt).localeCompare(String(a.updatedAt)))[0];
  return arr.find(e=>e.weekLabel===selectedFilterWeek)||null;
}

function wasUpdatedThisWeek(fid) {
  const latest = getLatestNarrative(fid);
  if (!latest) return false;
  return (new Date()-new Date(latest.updatedAt))/86400000 < 7;
}

// ─── WEEK CALENDAR ───────────────────────────────────────────
// Week 1 = Dec 29, 2025 (Mon). Reporting week = previous completed week.
const WEEK1 = new Date(2025,11,29);

function getWeekInfo(wkNum) {
  const start = new Date(WEEK1.getTime()+(wkNum-1)*7*86400000);
  const end   = new Date(start.getTime()+4*86400000);
  const fmt = d => d.toLocaleDateString('en-US',{month:'short',day:'2-digit'});
  return {num:wkNum, label:'Week '+wkNum+' - '+fmt(start)+'-'+fmt(end), start, end};
}

function getCurrentReportingWeek() {
  const now = new Date();
  const diff = Math.floor((now-WEEK1)/86400000);
  const current = Math.max(1,Math.floor(diff/7)+1);
  return Math.max(1,current-1); // report on previous week
}

function getCurrentWeekLabel() {
  return getWeekInfo(getCurrentReportingWeek()).label;
}

function getAllWeekOptions() {
  const reporting = getCurrentReportingWeek();
  const weeks = [];
  for (let i=reporting; i>=1; i--) weeks.push(getWeekInfo(i));
  return weeks;
}

// ─── JSONP ───────────────────────────────────────────────────
function jsonp(url) {
  return new Promise((resolve,reject)=>{
    const cb = 'hcb_'+Date.now();
    const script = document.createElement('script');
    const timer = setTimeout(()=>{ cleanup(); reject(new Error('Timeout')); },30000);
    function cleanup(){ clearTimeout(timer); delete window[cb]; if(script.parentNode) script.parentNode.removeChild(script); }
    window[cb] = data=>{ cleanup(); resolve(data); };
    script.src = url+(url.includes('?')?'&':'?')+'callback='+cb;
    script.onerror = ()=>{ cleanup(); reject(new Error('Script load failed')); };
    document.head.appendChild(script);
  });
}

async function loadData() {
  if (!SCRIPT_URL) return;
  setStatus('loading','Loading from Google Sheets...');
  try {
    const data = await jsonp(SCRIPT_URL+'?data='+encodeURIComponent(JSON.stringify({action:'getAll'})));
    if (data.error) throw new Error(data.error);
    allWeekly = data.weekly||[];
    allKpis   = data.kpis||[];
    dataLoaded = true;
    setStatus('ok','Connected · '+allWeekly.length+' weekly entries · '+allKpis.length+' KPI records · '+new Date().toLocaleTimeString());
    buildWeekFilter();
    renderOverview();
    populateMonthSelect();
    if (viewSec!=='overview') renderDetail(viewSec);
  } catch(e) {
    setStatus('err','Could not reach Google Sheets — '+e.message);
  }
}

async function postData(payload) {
  const url = SCRIPT_URL+'?data='+encodeURIComponent(JSON.stringify(payload));
  return jsonp(url);
}

function setStatus(state,msg) {
  document.getElementById('sdot').className='sdot '+state;
  document.getElementById('stext').textContent=msg;
}

function init() {
  const d=new Date(), y=d.getFullYear(), s=new Date(y,0,1);
  const wk=Math.ceil((((d-s)/86400000)+s.getDay()+1)/7);
  document.getElementById('week-meta').textContent='Week '+wk+' · '+d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})+' · Huddle every Tuesday';
  const dow=d.getDay();
  let dlText,dlCls;
  if(dow===1){dlText='Deadline today — Monday EOD';dlCls='dl-due';}
  else if(dow===2){dlText='Huddle today — Tuesday';dlCls='dl-warn';}
  else{const dtm=dow===0?1:(8-dow)%7||7;dlText='Narrative due in '+dtm+' day'+(dtm>1?'s':'');dlCls='dl-ok';}
  const badge=document.getElementById('dl-badge');
  badge.textContent=dlText; badge.className='dl-badge '+dlCls;
  buildViewTabs();

}

function buildWeekFilter() {
  const sel=document.getElementById('week-filter'); if(!sel) return;
  const weeks=[...new Set(allWeekly.map(e=>e.weekLabel))].sort((a,b)=>{
    const da=allWeekly.find(e=>e.weekLabel===a), db=allWeekly.find(e=>e.weekLabel===b);
    if(!da||!db) return 0;
    return String(db.updatedAt).localeCompare(String(da.updatedAt));
  });
  sel.innerHTML='<option value="latest">Latest update (default)</option>'+weeks.map(w=>'<option value="'+w+'" '+(w===selectedFilterWeek?'selected':'')+'>'+w+'</option>').join('');
  updateWFMeta();
}

function updateWFMeta() {
  const meta=document.getElementById('wf-meta'); if(!meta) return;
  if(selectedFilterWeek==='latest'){meta.textContent='Showing most recent per function';}
  else{const c=FUNCS.filter(f=>allWeekly.some(e=>e.funcId===f.id&&e.weekLabel===selectedFilterWeek)).length; meta.textContent=c+' of '+FUNCS.length+' updated';}
}

function onWeekFilterChange() {
  selectedFilterWeek=document.getElementById('week-filter').value;
  updateWFMeta(); renderOverview();
}

// ─── OVERVIEW ────────────────────────────────────────────────
function renderOverview() {
  let hc=0,upd=0,attRates=[],promoNums=[],promoHCs=[];
  FUNCS.forEach(f=>{
    hc+=getLatestHC(f.id)||f.hc;
    if(wasUpdatedThisWeek(f.id)) upd++;
    const att=getAttrition(f.id); if(att) attRates.push(parseFloat(att.rate));
    const promo=getPromo(f.id); if(promo){promoNums.push(promo.promotions);promoHCs.push(promo.avgHC||getLatestHC(f.id)||1);}
  });
  document.getElementById('ov-hc').textContent=hc.toLocaleString();
  document.getElementById('ov-upd').textContent=upd;
  if(attRates.length){const avg=(attRates.reduce((a,b)=>a+b,0)/attRates.length).toFixed(1);document.getElementById('ov-att').textContent=avg+'%';}
  else document.getElementById('ov-att').textContent='—';
  if(promoNums.length){const tp=promoNums.reduce((a,b)=>a+b,0),th=promoHCs.reduce((a,b)=>a+b,0)||1;document.getElementById('ov-promo').textContent=((tp/th)*100).toFixed(1)+'%';}
  else document.getElementById('ov-promo').textContent='—';

  const grid=document.getElementById('func-cards'); grid.innerHTML='';
  FUNCS.forEach(f=>{
    const rag=getFuncRag(f.id),defs=KPI_DEFS[f.id]||[],kpis=getLatestKpis(f.id);
    const updated=wasUpdatedThisWeek(f.id),latest=getFilteredNarrative(f.id);
    const att=getAttrition(f.id);
    const card=document.createElement('div'); card.className='fc';
    card.onclick=()=>{ const btn=document.querySelector('.vtab[data-fid="'+f.id+'"]'); showVsec(f.id,btn); };
    let kh='';
    if(kpis.length){
      kpis.slice(0,3).forEach((v,i)=>{
        if(!defs[i]) return;
        const r=getRag(f.id,i,v),pct=defs[i].hi?Math.min(v/defs[i].t*100,100):Math.max(0,100-(v/defs[i].t-1)*200);
        const col=r==='G'?'#4caf50':r==='A'?'#ff9800':'#f44336';
        kh+='<div class="km-row"><span class="km-lbl">'+defs[i].l+'</span><span class="km-val">'+v+(defs[i].t<=100&&v<=100?'%':'')+'</span></div><div class="km-bar"><div class="km-fill" style="width:'+Math.round(pct)+'%;background:'+col+'"></div></div>';
      });
    } else kh='<div class="no-data">No KPIs yet</div>';
    const stamp=(latest?latest.weekLabel:'Not updated')+(att?' · '+att.rate+'% attrition':'');
    card.innerHTML='<div class="fc-top"><div><div class="fc-name">'+f.name+'</div><div class="fc-role">'+f.role+'</div></div><div class="fc-dots"><div class="upd '+(updated?'upd-y':'upd-n')+'" title="'+(updated?'Updated':'Not updated')+'"></div><div class="rag rag-'+rag+'"></div></div></div>'+kh+'<div class="fc-stamp">'+stamp+'</div>';
    grid.appendChild(card);
  });
}

// ─── DETAIL ──────────────────────────────────────────────────
function renderDetail(fid) {
  const f=FUNCS.find(x=>x.id===fid),defs=KPI_DEFS[fid]||[];
  const el=document.getElementById('det-'+fid); if(!el) return;

  // KPI month selector
  const allKpiMonths=[...new Set(allKpis.filter(r=>r.funcId===fid&&(r.kpi1||r.kpi2||r.kpi3)).map(r=>normalizeMonth(r.month)))].filter(Boolean).sort().reverse();
  if(!detailKpiMonth[fid]&&allKpiMonths.length) detailKpiMonth[fid]=allKpiMonths[0];
  const selMonth=detailKpiMonth[fid]||allKpiMonths[0];
  const selKpis=selMonth?getKpisForMonth(fid,selMonth):getLatestKpis(fid);
  const kpiMonthOpts=allKpiMonths.map(m=>{const[y,mo]=m.split('-');const lbl=new Date(+y,+mo-1,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});return '<option value="'+m+'" '+(m===selMonth?'selected':'')+'>'+lbl+'</option>';}).join('');
  const kpiMonthNav=allKpiMonths.length?'<div class="mo-sel"><label>Month:</label><select onchange="setDetailKpiMonth(\''+fid+'\',this.value)">'+kpiMonthOpts+'</select><span style="font-size:11px;color:#aaa">'+allKpiMonths.length+' month'+(allKpiMonths.length!==1?'s':'')+' on record</span></div>':'';

  let kpiBlock='<div class="no-data">No KPI data yet.</div>';
  if(selKpis&&selKpis.length){
    let rows='';
    selKpis.forEach((v,i)=>{
      if(!defs[i]) return;
      const r=getRag(fid,i,v),isLg=defs[i].t>100;
      const disp=v+(!isLg&&v<=100?'%':''),tDisp=defs[i].t+(!isLg&&defs[i].t<=100?'%':'');
      const diff=defs[i].hi?(v-defs[i].t):(defs[i].t-v);
      const ds=(diff>=0?'+':'')+diff.toFixed(1)+(!isLg&&v<=100?'pp':'');
      rows+='<tr><td>'+defs[i].l+'</td><td>'+tDisp+'</td><td><b>'+disp+'</b></td><td><span class="rb '+r+'">'+(r==='G'?'On track':r==='A'?'Monitor':r==='R'?'Attention':'—')+'</span></td><td class="'+(diff>=0?'tup':'tdn')+'">'+(diff>=0?'↑':'↓')+' '+ds+'</td></tr>';
    });
    kpiBlock='<table class="kpi-tbl"><thead><tr><th>KPI</th><th>Target</th><th>Actual</th><th>Status</th><th>vs Target</th></tr></thead><tbody>'+rows+'</tbody></table>';
  }

  // Week selector
  const allFuncEntries=[...allWeekly.filter(r=>r.funcId===fid)].sort((a,b)=>String(b.updatedAt).localeCompare(String(a.updatedAt)));
  const allCalWeeks=getAllWeekOptions();
  if(!detailWeek[fid]) detailWeek[fid]=allCalWeeks[0].label;
  const selEntry=allFuncEntries.find(e=>e.weekLabel===detailWeek[fid])||null;
  const submittedWeeks=new Set(allFuncEntries.map(e=>e.weekLabel));
  const weekOpts=allCalWeeks.map(w=>'<option value="'+w.label+'" '+(w.label===detailWeek[fid]?'selected':'')+'>'+(submittedWeeks.has(w.label)?'✓ ':'')+w.label+'</option>').join('');
  const weekNav='<div class="wk-sel"><label>Week:</label><select onchange="setDetailWeek(\''+fid+'\',this.value)">'+weekOpts+'</select><span style="font-size:11px;color:#aaa">'+submittedWeeks.size+' of '+allCalWeeks.length+' weeks submitted</span></div>';

  let narBlock='<div class="no-data">No entry for this week yet.</div>';
  if(selEntry) narBlock='<div class="nar-grid">'+NAR_FIELDS.map(nf=>'<div class="nc"><div class="nc-lbl">'+nf.label+'</div><div class="nc-text">'+(selEntry[nf.k]||'—')+'</div></div>').join('')+'</div>';

  // People data
  const pr=getLatestPeopleRec(fid);
  const att=getAttrition(fid),promo=getPromo(fid);
  const attStr=att?'Attrition: <b>'+att.rate+'%</b> annualized ('+att.resignations+' resignation'+(att.resignations!==1?'s':'')+' YTD)':'Attrition: not entered';
  const promoStr=promo?'Internal movement: <b>'+promo.pct+'%</b> ('+promo.promotions+' YTD)':'Internal movement: not entered';
  const openReqStr=pr&&pr.openRequisitions?'Open reqs: <b>'+pr.openRequisitions+'</b>':'';
  const newRolesStr=pr&&pr.newRolesSinceJan?'New roles YTD: <b>'+pr.newRolesSinceJan+'</b>':'';
  const extras=[openReqStr,newRolesStr].filter(Boolean).join(' &nbsp;·&nbsp; ');

  // History
  let histHtml=allFuncEntries.length?allFuncEntries.slice(0,10).map(e=>{
    const cats=NAR_FIELDS.filter(nf=>e[nf.k]&&e[nf.k].toString().trim());
    const isSel=e.weekLabel===detailWeek[fid];
    return '<div class="he" style="'+(isSel?'border-color:#1a1a2e;background:#f8f9ff':'')+'" onclick="setDetailWeek(\''+fid+'\',\''+e.weekLabel.replace(/'/,"\\'")+'\')">'+'<div class="he-hdr"><span style="'+(isSel?'font-weight:700':'')+'">'+e.weekLabel+'</span><span style="color:#aaa">'+new Date(e.updatedAt).toLocaleDateString()+'</span></div>'+'<div>'+cats.map(c=>'<span class="pill">'+c.label+'</span>').join('')+'</div></div>';
  }).join(''):'<div class="no-data">No history yet.</div>';

  el.innerHTML=
    '<div class="det-hdr"><div class="det-title">'+f.name+' — '+f.role+'</div>'+
    '<div class="det-sub">HC: '+getLatestHC(fid)+' &nbsp;·&nbsp; '+attStr+' &nbsp;·&nbsp; '+promoStr+(extras?' &nbsp;·&nbsp; '+extras:'')+' &nbsp;·&nbsp; '+allFuncEntries.length+' weeks on record</div></div>'+
    '<div class="card"><div class="card-title">Monthly KPIs</div>'+kpiMonthNav+kpiBlock+'</div>'+
    weekNav+
    '<div class="card"><div class="card-title">Narrative — '+(selEntry?selEntry.weekLabel:'none')+'</div>'+narBlock+'</div>'+
    '<div class="card"><div class="card-title">All weeks (click to view)</div>'+histHtml+'</div>';
}

        '<div class="ng"><label>New roles since January</label><input type="number" min="0" id="hc_newrole" value="'+vNewRole+'" placeholder="0" oninput="saveHCDraft(\''+inpFunc+'\')"></div>'+
      '</div>'+
      '<div class="info-box">Annualized attrition and internal movement % are computed automatically.</div>'+
      '<div class="btn-row"><button class="save-btn" onclick="saveHCData()" '+(dataLoaded?'':'disabled')+'>Save HC &amp; people data ↗</button></div></div>';
  }
}

// Draft functions
function saveWDraft(fid) {
  const d={};
  NAR_FIELDS.forEach(nf=>{ const el=document.getElementById('wn_'+nf.k); if(el) d[nf.k]=el.value; });
  const hcEl=document.getElementById('wn_hc'); if(hcEl) d.hc=hcEl.value;
  setDraft('wd_'+fid,d);
}

function clearWDraft(fid) {
  clearDraft('wd_'+fid);
  NAR_FIELDS.forEach(nf=>{ const el=document.getElementById('wn_'+nf.k); if(el) el.value=''; });
  const hcEl=document.getElementById('wn_hc'); if(hcEl) hcEl.value='';
}

function saveHCDraft(fid) {
  const d={
    resignations: document.getElementById('hc_resign')?.value||'',
    promotions:   document.getElementById('hc_promo')?.value||'',
    avgHC:        document.getElementById('hc_avghc')?.value||'',
    openReqs:     document.getElementById('hc_openreq')?.value||'',
    newRoles:     document.getElementById('hc_newrole')?.value||'',
  };
  setDraft('hcd_'+fid,d);
}

// Save functions
async function saveWeekly() {
  const wkSel=document.getElementById('wn_week');
  const wkLabel=wkSel?wkSel.value:getCurrentWeekLabel();
  const f=FUNCS.find(x=>x.id===inpFunc);
  const payload={action:'saveWeekly',funcId:inpFunc,funcName:f.name,weekLabel:wkLabel};
  NAR_FIELDS.forEach(nf=>{ const el=document.getElementById('wn_'+nf.k); payload[nf.k]=el?el.value:''; });
  const hcEl=document.getElementById('wn_hc');
  if(hcEl&&hcEl.value) payload.hc=parseInt(hcEl.value);
  try {
    const btn=document.querySelector('#inp-form .save-btn'); btn.textContent='Saving...'; btn.disabled=true;
    const res=await postData(payload);
    if(res.error) throw new Error(res.error);
    clearDraft('wd_'+inpFunc);
    showToast('Weekly narrative saved ✓');
    await loadData();
    renderInpForm();
  } catch(e){ showToast('Save failed: '+e.message); const btn=document.querySelector('#inp-form .save-btn'); if(btn){btn.textContent='Save weekly update ↗';btn.disabled=false;} }
}

async function saveKpis() {
  const cm=localMonth();
  const defs=KPI_DEFS[inpFunc]||[];
  const f=FUNCS.find(x=>x.id===inpFunc);
  const kpis=defs.map((_,i)=>{ const el=document.getElementById('ki_'+i); return el&&el.value!==''?parseFloat(el.value):null; });
  try {
    const btn=document.querySelector('#inp-form .save-btn'); btn.textContent='Saving...'; btn.disabled=true;
    const res=await postData({action:'saveKpi',funcId:inpFunc,funcName:f.name,month:cm,kpis});
    if(res.error) throw new Error(res.error);
    showToast('KPI data saved ✓');
    await loadData();
    renderInpForm();
  } catch(e){ showToast('Save failed: '+e.message); const btn=document.querySelector('#inp-form .save-btn'); if(btn){btn.textContent='Save KPI update ↗';btn.disabled=false;} }
}

async function saveHCData() {
  const cm=localMonth();
  const f=FUNCS.find(x=>x.id===inpFunc);
  const resignations=document.getElementById('hc_resign')?.value!==''?parseInt(document.getElementById('hc_resign').value):null;
  const promotions=document.getElementById('hc_promo')?.value!==''?parseInt(document.getElementById('hc_promo').value):null;
  const avgHC=document.getElementById('hc_avghc')?.value!==''?parseFloat(document.getElementById('hc_avghc').value):null;
  const openRequisitions=document.getElementById('hc_openreq')?.value!==''?parseInt(document.getElementById('hc_openreq').value):null;
  const newRolesSinceJan=document.getElementById('hc_newrole')?.value!==''?parseInt(document.getElementById('hc_newrole').value):null;
  try {
    const btn=document.querySelector('#inp-form .save-btn'); btn.textContent='Saving...'; btn.disabled=true;
    const res=await postData({action:'saveKpi',funcId:inpFunc,funcName:f.name,month:cm,kpis:[],resignations,promotions,avgHC,openRequisitions,newRolesSinceJan});
    if(res.error) throw new Error(res.error);
    // Update local cache immediately so form pre-fills correctly on next render
    const existing=allKpis.findIndex(r=>r.funcId===inpFunc&&normalizeMonth(r.month)===cm);
    const updated={funcId:inpFunc,funcName:f.name,month:cm,updatedAt:new Date().toISOString(),
      resignations:resignations!=null?resignations:'',promotions:promotions!=null?promotions:'',
      avgHC:avgHC!=null?avgHC:'',openRequisitions:openRequisitions!=null?openRequisitions:'',
      newRolesSinceJan:newRolesSinceJan!=null?newRolesSinceJan:''};
    if(existing>=0) Object.assign(allKpis[existing],updated);
    else allKpis.push(updated);
    clearDraft('hcd_'+inpFunc);
    showToast('HC & people data saved ✓');
    loadData(); // refresh in background
    renderInpForm();
  } catch(e){ showToast('Save failed: '+e.message); const btn=document.querySelector('#inp-form .save-btn'); if(btn){btn.textContent='Save HC & people data ↗';btn.disabled=false;} }
}

// ─── REPORT ──────────────────────────────────────────────────
function populateMonthSelect() {
  const months=new Set();
  allKpis.forEach(r=>months.add(normalizeMonth(r.month)));
  allWeekly.forEach(r=>{ if(r.updatedAt) months.add(normalizeMonth(r.updatedAt)); });
  months.add(localMonth());
  const sel=document.getElementById('rpt-month');
  const sorted=[...months].filter(Boolean).sort().reverse();
  sel.innerHTML=sorted.map(m=>{ const[y,mo]=m.split('-'); const lbl=new Date(+y,+mo-1,1).toLocaleDateString('en-US',{month:'long',year:'numeric'}); return '<option value="'+m+'">'+lbl+'</option>'; }).join('');
}

function generateReport() {
  const month=document.getElementById('rpt-month').value;
  const[y,mo]=month.split('-');
  const monthLabel=new Date(+y,+mo-1,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
  let totalGreen=0,blockerLines=[],updatedCount=0;
  FUNCS.forEach(f=>{
    const kpis=getKpisForMonth(f.id,month);
    if(kpis&&kpis.length){const rags=kpis.map((v,i)=>getRag(f.id,i,v));if(!rags.includes('R')&&!rags.includes('A'))totalGreen++;}
    const entries=allWeekly.filter(r=>r.funcId===f.id&&normalizeMonth(r.updatedAt)===month);
    if(entries.length)updatedCount++;
    entries.forEach(e=>{ if(e.redFlag&&e.redFlag.toString().trim()&&e.redFlag.toString().toLowerCase().indexOf('none')<0) blockerLines.push('<li><b>'+f.name+'</b> ('+e.weekLabel+'): '+e.redFlag+'</li>'); });
  });
  const execHtml='<div class="rpt-exec"><div class="rpt-exec-title">Manila Services — Executive Summary</div><p style="margin-bottom:.5rem">Manila Services closed <b>'+monthLabel+'</b> with <b>'+totalGreen+'</b> of '+FUNCS.length+' functions fully on track. <b>'+updatedCount+'</b> of '+FUNCS.length+' functions submitted weekly narratives.</p>'+(blockerLines.length?'<p style="font-weight:700;margin-bottom:.25rem">Open blockers:</p><ul style="padding-left:1.25rem;font-size:11px">'+blockerLines.join('')+'</ul>':'<p style="color:#aaa">No open blockers this month.</p>')+'</div>';
  let funcSections='';
  FUNCS.forEach(f=>{
    const kpis=getKpisForMonth(f.id,month),defs=KPI_DEFS[f.id]||[];
    const entries=allWeekly.filter(r=>r.funcId===f.id&&normalizeMonth(r.updatedAt)===month).sort((a,b)=>String(a.updatedAt).localeCompare(String(b.updatedAt)));
    if(!kpis&&!entries.length) return;
    const rag=kpis&&kpis.length?getFuncRag(f.id):'N';
    const ragCol=rag==='G'?'#4caf50':rag==='A'?'#ff9800':rag==='R'?'#f44336':'#ccc';
    let kpiBlock='<div style="font-size:11px;color:#aaa;font-style:italic">No KPI data.</div>';
    if(kpis&&kpis.length){const rows=kpis.map((v,i)=>{ if(!defs[i])return ''; const r=getRag(f.id,i,v),isLg=defs[i].t>100; return '<div class="rpt-kpi-row"><span>'+defs[i].l+'</span><span>'+defs[i].t+(!isLg?'%':'')+'</span><span><b>'+v+(!isLg&&v<=100?'%':'')+'</b></span><span style="color:'+(r==='G'?'#2e7d32':r==='A'?'#e65100':'#c62828')+'">'+(r==='G'?'On track':r==='A'?'Monitor':'Attention')+'</span></div>'; }).join(''); kpiBlock='<div style="font-size:11px"><div class="rpt-kpi-row hdr"><span>KPI</span><span>Target</span><span>Actual</span><span>Status</span></div>'+rows+'</div>';}
    const cons={}; NAR_FIELDS.forEach(nf=>{cons[nf.k]=[];}); entries.forEach(e=>{NAR_FIELDS.forEach(nf=>{if(e[nf.k]&&e[nf.k].toString().trim())cons[nf.k].push('['+e.weekLabel+'] '+e[nf.k]);});});
    const narCards=NAR_FIELDS.map(nf=>'<div><div class="rpt-nar-lbl">'+nf.label+'</div><div style="font-size:11px;line-height:1.6;margin-bottom:.5rem">'+(cons[nf.k].join('<br><br>')||'—')+'</div></div>').join('');
    funcSections+='<div class="rpt-fsec"><div class="rpt-fhdr"><div style="width:9px;height:9px;border-radius:50%;background:'+ragCol+';flex-shrink:0"></div><div class="rpt-fname">'+f.name+' — '+f.role+'</div><div style="font-size:11px;color:#aaa;margin-left:auto">'+entries.length+' week'+(entries.length!==1?'s':'')+'</div></div>'+kpiBlock+'<div class="rpt-nar-grid" style="margin-top:.75rem">'+narCards+'</div></div>';
  });
  document.getElementById('report-out').innerHTML='<div class="rpt-title">Manila Services — Monthly Report</div><div class="rpt-sub">'+monthLabel+' · Generated '+new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})+'</div>'+execHtml+(funcSections||'<div style="color:#aaa;font-size:12px">No data for this month.</div>');
}

function printReport() {
  const content=document.getElementById('report-out').innerHTML;
  const w=window.open('','_blank');
  w.document.write('<html><head><title>Manila Services Monthly Report</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;font-size:12px;padding:2cm;color:#111;max-width:900px;margin:0 auto}.rpt-title{font-size:20px;font-weight:700;margin-bottom:4px}.rpt-sub{font-size:11px;color:#666;margin-bottom:1.5rem;padding-bottom:.75rem;border-bottom:1px solid #ddd}.rpt-exec{background:#f5f5f5;border-radius:6px;padding:1rem;margin-bottom:1.25rem}.rpt-exec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem;color:#666}.rpt-fsec{margin-bottom:1.25rem;padding-bottom:1.25rem;border-bottom:1px solid #eee}.rpt-fhdr{display:flex;align-items:center;gap:8px;margin-bottom:.75rem}.rpt-fname{font-size:13px;font-weight:700}.rpt-kpi-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:6px;font-size:11px;padding:4px 0;border-bottom:1px solid #eee}.rpt-kpi-row.hdr{font-weight:700;color:#aaa;font-size:10px;text-transform:uppercase}.rpt-nar-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:.75rem}.rpt-nar-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#aaa;margin-bottom:3px}ul{padding-left:1.25rem}@media print{body{padding:1cm}}</style></head><body>'+content+'</body></html>');
  w.document.close(); w.focus(); setTimeout(()=>w.print(),400);
}

// ─── NAV ─────────────────────────────────────────────────────
function setNav(n) {
  nav=n;
  ['dash','update','report'].forEach(p=>{ document.getElementById('pane-'+p).classList.toggle('active',p===n); document.getElementById('nb-'+p).classList.toggle('active',p===n); });
  if(n==='update') renderInpForm();
  if(n==='report') populateMonthSelect();
}

function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg;
  t.style.display='block'; setTimeout(()=>t.style.display='none',3000);
}

init();
</script>
